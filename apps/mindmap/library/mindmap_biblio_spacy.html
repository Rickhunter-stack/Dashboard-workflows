<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mind Map - Composants spaCy</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        overflow: hidden;
      }

      .container {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 20px;
      }

      .header {
        text-align: center;
        margin-bottom: 20px;
      }

      .header h1 {
        color: #2c3e50;
        font-size: 2.5em;
        margin-bottom: 10px;
      }

      .header p {
        color: #546e7a;
        font-size: 1.1em;
      }

      .mindmap {
        flex: 1;
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        position: relative;
        overflow: hidden;
      }

      svg {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      .node {
        position: absolute;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        z-index: 1;
        text-align: center;
        padding: 10px;
      }

      .node:hover {
        transform: scale(1.15);
        box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);
      }

      .node.selected {
        transform: scale(1.15);
        box-shadow: 0 0 0 4px #ffd700;
      }

      .node.large {
        width: 140px;
        height: 140px;
        font-size: 1.3em;
      }

      .node.medium {
        width: 120px;
        height: 120px;
        font-size: 1em;
      }

      .node.small {
        width: 100px;
        height: 100px;
        font-size: 0.9em;
      }

      .bg-blue {
        background: #3b82f6;
      }
      .bg-purple {
        background: #a855f7;
      }
      .bg-purple-light {
        background: #c084fc;
      }
      .bg-green {
        background: #22c55e;
      }
      .bg-green-light {
        background: #4ade80;
      }
      .bg-orange {
        background: #f97316;
      }
      .bg-orange-light {
        background: #fb923c;
      }
      .bg-red {
        background: #ef4444;
      }
      .bg-red-light {
        background: #f87171;
      }

      .description-box {
        position: absolute;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        border: 2px solid #3b82f6;
        z-index: 2;
        display: none;
      }

      .description-box.active {
        display: block;
        animation: slideUp 0.3s ease;
      }

      @keyframes slideUp {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .description-box h3 {
        color: #2c3e50;
        font-size: 1.5em;
        margin-bottom: 10px;
      }

      .description-box p {
        color: #546e7a;
        font-size: 1.1em;
        line-height: 1.6;
      }

      .close-btn {
        position: absolute;
        top: 15px;
        right: 20px;
        background: none;
        border: none;
        font-size: 2em;
        color: #95a5a6;
        cursor: pointer;
        transition: color 0.2s;
      }

      .close-btn:hover {
        color: #2c3e50;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Mind Map - Composants spaCy</h1>
        <p>Cliquez sur un nœud pour voir sa description</p>
      </div>

      <div class="mindmap" id="mindmap">
        <svg id="connections"></svg>
        <div id="nodes"></div>

        <div class="description-box" id="descriptionBox">
          <button class="close-btn" onclick="closeDescription()">×</button>
          <h3 id="descTitle"></h3>
          <p id="descText"></p>
        </div>
      </div>
    </div>

    <script>
      const nodes = [
        // Centre
        {
          id: "spacy",
          x: 600,
          y: 400,
          label: "spaCy",
          color: "bg-blue",
          size: "large",
        },

        // Branches principales (plus écartées)
        {
          id: "pipeline",
          x: 250,
          y: 180,
          label: "Pipeline",
          color: "bg-purple",
          size: "medium",
        },
        {
          id: "models",
          x: 950,
          y: 180,
          label: "Modèles",
          color: "bg-green",
          size: "medium",
        },
        {
          id: "data",
          x: 200,
          y: 600,
          label: "Structures de données",
          color: "bg-orange",
          size: "medium",
        },
        {
          id: "features",
          x: 1000,
          y: 600,
          label: "Fonctionnalités",
          color: "bg-red",
          size: "medium",
        },

        // Sous-branches Pipeline (plus écartées)
        {
          id: "tokenizer",
          x: 80,
          y: 80,
          label: "Tokenizer",
          color: "bg-purple-light",
          size: "small",
        },
        {
          id: "tagger",
          x: 220,
          y: 40,
          label: "POS Tagger",
          color: "bg-purple-light",
          size: "small",
        },
        {
          id: "parser",
          x: 380,
          y: 80,
          label: "Parser",
          color: "bg-purple-light",
          size: "small",
        },
        {
          id: "ner",
          x: 420,
          y: 210,
          label: "NER",
          color: "bg-purple-light",
          size: "small",
        },

        // Sous-branches Modèles (plus écartées)
        {
          id: "pretrained",
          x: 850,
          y: 40,
          label: "Pré-entraînés",
          color: "bg-green-light",
          size: "small",
        },
        {
          id: "custom",
          x: 1020,
          y: 60,
          label: "Personnalisés",
          color: "bg-green-light",
          size: "small",
        },
        {
          id: "transformer",
          x: 1100,
          y: 140,
          label: "Transformers",
          color: "bg-green-light",
          size: "small",
        },

        // Sous-branches Structures (plus écartées)
        {
          id: "doc",
          x: 40,
          y: 520,
          label: "Doc",
          color: "bg-orange-light",
          size: "small",
        },
        {
          id: "token",
          x: 80,
          y: 660,
          label: "Token",
          color: "bg-orange-light",
          size: "small",
        },
        {
          id: "span",
          x: 220,
          y: 720,
          label: "Span",
          color: "bg-orange-light",
          size: "small",
        },
        {
          id: "vocab",
          x: 340,
          y: 680,
          label: "Vocab",
          color: "bg-orange-light",
          size: "small",
        },

        // Sous-branches Fonctionnalités (plus écartées)
        {
          id: "similarity",
          x: 1100,
          y: 520,
          label: "Similarité",
          color: "bg-red-light",
          size: "small",
        },
        {
          id: "vectors",
          x: 1020,
          y: 720,
          label: "Word Vectors",
          color: "bg-red-light",
          size: "small",
        },
        {
          id: "matcher",
          x: 860,
          y: 680,
          label: "Matcher",
          color: "bg-red-light",
          size: "small",
        },
        {
          id: "lemma",
          x: 1140,
          y: 650,
          label: "Lemmatizer",
          color: "bg-red-light",
          size: "small",
        },
      ];

      const connections = [
        { from: "spacy", to: "pipeline" },
        { from: "spacy", to: "models" },
        { from: "spacy", to: "data" },
        { from: "spacy", to: "features" },
        { from: "pipeline", to: "tokenizer" },
        { from: "pipeline", to: "tagger" },
        { from: "pipeline", to: "parser" },
        { from: "pipeline", to: "ner" },
        { from: "models", to: "pretrained" },
        { from: "models", to: "custom" },
        { from: "models", to: "transformer" },
        { from: "data", to: "doc" },
        { from: "data", to: "token" },
        { from: "data", to: "span" },
        { from: "data", to: "vocab" },
        { from: "features", to: "similarity" },
        { from: "features", to: "vectors" },
        { from: "features", to: "matcher" },
        { from: "features", to: "lemma" },
      ];

      const descriptions = {
        spacy:
          "Bibliothèque Python pour le traitement du langage naturel (NLP)",
        pipeline: "Chaîne de traitement des composants NLP",
        tokenizer: "Segmente le texte en tokens (mots, ponctuation, etc.)",
        tagger:
          "Identifie les parties du discours (verbe, nom, adjectif, etc.)",
        parser: "Analyse syntaxique et dépendances grammaticales",
        ner: "Reconnaissance des entités nommées (personnes, lieux, organisations, etc.)",
        models: "Modèles statistiques pour différentes langues",
        pretrained:
          "Modèles déjà entraînés (en_core_web_sm, fr_core_news_sm, etc.)",
        custom: "Modèles entraînés sur vos propres données",
        transformer: "Modèles basés sur des transformers (BERT, RoBERTa, etc.)",
        data: "Objets conteneurs pour les données linguistiques",
        doc: "Document traité contenant tokens et annotations",
        token: "Unité de texte individuelle avec attributs linguistiques",
        span: "Tranche de Doc représentant une séquence de tokens",
        vocab: "Vocabulaire partagé stockant les chaînes et vecteurs",
        features: "Capacités avancées de traitement",
        similarity: "Calcul de similarité sémantique entre textes",
        vectors: "Représentations vectorielles des mots (word embeddings)",
        matcher: "Recherche de motifs basés sur règles",
        lemma: "Réduit les mots à leur forme de base (lemme)",
      };

      let selectedNode = null;

      function drawConnections() {
        const svg = document.getElementById("connections");
        connections.forEach((conn) => {
          const fromNode = nodes.find((n) => n.id === conn.from);
          const toNode = nodes.find((n) => n.id === conn.to);
          const line = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "line"
          );
          line.setAttribute("x1", fromNode.x);
          line.setAttribute("y1", fromNode.y);
          line.setAttribute("x2", toNode.x);
          line.setAttribute("y2", toNode.y);
          line.setAttribute("stroke", "#cbd5e1");
          line.setAttribute("stroke-width", "2");
          line.setAttribute("opacity", "0.6");
          svg.appendChild(line);
        });
      }

      function createNodes() {
        const container = document.getElementById("nodes");
        nodes.forEach((node) => {
          const div = document.createElement("div");
          div.className = `node ${node.size} ${node.color}`;
          div.textContent = node.label;

          const size =
            node.size === "large" ? 70 : node.size === "medium" ? 60 : 50;
          div.style.left = node.x - size + "px";
          div.style.top = node.y - size + "px";

          div.onclick = () => showDescription(node.id);
          container.appendChild(div);
        });
      }

      function showDescription(nodeId) {
        if (selectedNode) {
          document
            .querySelector(`[data-node="${selectedNode}"]`)
            ?.classList.remove("selected");
        }

        selectedNode = nodeId;
        const nodeElement = Array.from(document.querySelectorAll(".node")).find(
          (el) => el.textContent === nodes.find((n) => n.id === nodeId).label
        );
        if (nodeElement) {
          nodeElement.setAttribute("data-node", nodeId);
          nodeElement.classList.add("selected");
        }

        document.getElementById("descTitle").textContent = nodes.find(
          (n) => n.id === nodeId
        ).label;
        document.getElementById("descText").textContent = descriptions[nodeId];
        document.getElementById("descriptionBox").classList.add("active");
      }

      function closeDescription() {
        document.getElementById("descriptionBox").classList.remove("active");
        if (selectedNode) {
          document
            .querySelector(`[data-node="${selectedNode}"]`)
            ?.classList.remove("selected");
          selectedNode = null;
        }
      }

      drawConnections();
      createNodes();
    </script>
  </body>
</html>
