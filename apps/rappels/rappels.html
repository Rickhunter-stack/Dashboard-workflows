<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rappels</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared/theme.css" />
    <link rel="stylesheet" href="../shared/dashboard-app.css" />
    <link rel="stylesheet" href="rappels-styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../shared/supabase-client.js"></script>
  </head>

  <body class="dashboard-app">
    <!--
      README - RAPPELS
      Persistance : localStorage "rappelsData" (+ Supabase si configuré).
    -->

    <div class="rappels-container dash-app-wrap">
      <header class="rappels-header">
        <div class="dash-hero">
          <div class="dash-top-row">
            <div class="dash-avatar" aria-hidden="true"></div>
            <h1 class="dash-title">Rappels</h1>
            <button
              type="button"
              class="dash-icon-btn"
              aria-label="Rechercher"
              onclick="document.getElementById('filter-input')?.focus()"
            >
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
              </svg>
            </button>
          </div>
        </div>
        <div class="dash-toolbar">
          <div class="dash-search-wrap">
            <span class="dash-search-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
              </svg>
            </span>
            <input
              type="search"
              id="filter-input"
              class="filter-input dash-filter-input"
              placeholder="Search your reminders..."
              aria-label="Filtrer les rappels"
              autocomplete="off"
            />
          </div>
          <div class="dash-header-actions">
            <button class="btn-new-reminder btn-primary-accent" id="btn-new-reminder" type="button" aria-label="Ajouter un nouveau rappel">
              Nouveau rappel
            </button>
          </div>
        </div>
      </header>

      <main class="reminders-list" id="reminders-list" role="list" aria-label="Liste des rappels">
        <!-- Les rappels seront générés ici par JavaScript -->
      </main>
    </div>

    <script src="rappels-script.js"></script>
  </body>
</html>
