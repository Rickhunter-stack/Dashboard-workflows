<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rappels</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared/theme.css" />
    <link rel="stylesheet" href="rappels-styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../shared/supabase-client.js"></script>
  </head>

  <body>
    <!--
      README - RAPPELS
      
      Comment ajouter un lien dans index.html:
      Dans la section <nav class="nav-buttons">, ajoutez:
      <a href="#" class="nav-btn" id="btn-rappels" data-app="rappels">
        🔔 Rappels
      </a>
      
      Et dans l'objet appPaths du script:
      'rappels': 'apps/rappels/rappels.html'
      
      ⚙️ Fonctionnalités:
      - Ajouter/Supprimer des rappels facilement
      - 3 boutons de couleur pour marquer la priorité (rouge, orange, vert)
      - Paramétrer une date/heure pour chaque rappel
      - Alertes configurables (1 jour avant, 1 heure avant, etc.)
      
      💾 Persistance des données:
      Toutes les données sont sauvegardées automatiquement
      dans le localStorage du navigateur sous la clé "rappelsData".
    -->

    <div class="rappels-container">
      <header class="rappels-header">
        <h1>Rappels</h1>
        
        <div class="header-actions">
          <div class="filter-container">
            <input
              type="text"
              id="filter-input"
              class="filter-input"
              placeholder="🔍 Filtrer les rappels..."
              aria-label="Filtrer les rappels"
            />
          </div>
          
          <button class="btn-new-reminder btn-primary-accent" id="btn-new-reminder" aria-label="Ajouter un nouveau rappel">
            ➕ Nouveau rappel
          </button>
        </div>
      </header>

      <main class="reminders-list" id="reminders-list" role="list" aria-label="Liste des rappels">
        <!-- Les rappels seront générés ici par JavaScript -->
      </main>
    </div>

    <script src="rappels-script.js"></script>
  </body>
</html>
