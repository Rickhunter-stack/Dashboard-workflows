<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projets actifs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared/theme.css" />
    <link rel="stylesheet" href="kanban-styles.css" />
    <script src="../shared/supabase-client.js"></script>
  </head>

  <body class="kanban-app">
    <!--
      README - KANBAN-LITE
      
      Comment ajouter un lien dans index.html:
      Dans la section <nav class="nav-buttons">, ajoutez:
      <a href="#" class="nav-btn" id="btn-kanban" data-app="kanban">
        📋 Kanban
      </a>
      
      Et dans l'objet appPaths du script:
      'kanban': 'apps/kanban-lite/kanban.html'
      
      ⚙️ Personnalisation des colonnes:
      Pour changer les titres par défaut des colonnes, modifiez la fonction initState() 
      dans kanban-script.js (lignes 9-13):
      - lists[0].title pour "À faire"
      - lists[1].title pour "En cours"
      - lists[2].title pour "Fait"
      
      💾 Persistance des données:
      Toutes les données (colonnes, cartes, notes) sont sauvegardées automatiquement
      dans le localStorage du navigateur sous la clé "kanbanLiteBoard".
      Les modifications sont persistées en temps réel.
    -->

    <div class="kanban-container">
      <header class="kanban-header">
        <div class="dashboard-hero">
          <div class="dashboard-top-row">
            <div class="dashboard-avatar" aria-hidden="true"></div>
            <h1 class="dashboard-title">Active Projects</h1>
            <span class="dashboard-pending-badge" id="dashboard-pending-count" aria-live="polite">0 PENDING</span>
            <button
              type="button"
              class="dashboard-icon-btn"
              aria-label="Recherche"
              onclick="document.getElementById('filter-input')?.focus()"
            >
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
              </svg>
            </button>
          </div>
        </div>

        <div class="kanban-toolbar">
          <div class="search-field-wrap">
            <span class="search-field-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
              </svg>
            </span>
            <input
              type="search"
              id="filter-input"
              class="filter-input"
              placeholder="Search your projects..."
              aria-label="Rechercher un projet par titre ou note"
              autocomplete="off"
            />
            <kbd class="search-kbd-hint" aria-hidden="true">⌘K</kbd>
          </div>

          <div class="header-actions">
            <div class="view-toggle" role="tablist" aria-label="Vue">
              <button class="view-btn active" id="view-todo" type="button" role="tab" aria-selected="true">
                À faire
              </button>
              <button class="view-btn" id="view-done" type="button" role="tab" aria-selected="false">
                Fait
              </button>
            </div>
          </div>
        </div>
      </header>

      <main class="board" id="board" role="list" aria-label="Tableau des projets">
        <!-- Cartes générées par JavaScript -->
      </main>

      <button class="btn-new-card fab-add" id="btn-new-card" type="button" aria-label="Ajouter une nouvelle carte">
        <span class="fab-add-icon" aria-hidden="true">+</span>
      </button>
    </div>

    <script src="kanban-script.js"></script>
  </body>
</html>
