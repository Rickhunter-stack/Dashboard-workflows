<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liens rapides</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared/theme.css" />
    <link rel="stylesheet" href="links-styles.css" />
  </head>
  <body>
    <div class="links-container">
      <header class="links-header">
        <h1>Liens rapides</h1>
        <p class="links-subtitle">
          Accès direct à tes outils du quotidien. Clique pour ouvrir dans un nouvel onglet.
        </p>
      </header>

      <main class="links-main">
        <section class="links-drawer">
          <button
            class="links-toggle"
            id="links-toggle"
            type="button"
            aria-expanded="true"
          >
            <span>Mes liens favoris</span>
            <span class="chevron" aria-hidden="true">▾</span>
          </button>
          <div class="links-list" id="links-list"></div>
        </section>
      </main>
    </div>

    <script src="links-script.js"></script>
  </body>
</html>
