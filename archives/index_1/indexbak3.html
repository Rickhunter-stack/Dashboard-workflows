<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Générateur IA - Prompts, Workflows, Mind Maps & Infographies</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #0a0e27 0%, #16213e 100%);
        color: #e8eaf6;
        min-height: 100vh;
      }

      .main-nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: rgba(10, 14, 39, 0.95);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        z-index: 1000;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
      }

      .nav-container {
        max-width: 1600px;
        margin: 0 auto;
        padding: 16px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .nav-logo {
        font-size: 20px;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .nav-buttons {
        display: flex;
        gap: 12px;
      }

      .nav-btn {
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 14px;
        background: rgba(255, 255, 255, 0.05);
        color: #b8c5d6;
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 10px 24px;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        backdrop-filter: blur(10px);
        text-decoration: none;
        display: inline-block;
      }

      .nav-btn:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.12);
        transform: translateY(-1px);
      }

      .nav-btn.active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #ffffff;
        border-color: transparent;
        box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
      }

      .app-frame {
        width: 100%;
        border: none;
        min-height: calc(100vh - 64px);
        margin-top: 64px;
      }

      @media (max-width: 768px) {
        .nav-container {
          flex-direction: column;
          gap: 12px;
          padding: 12px 16px;
        }

        .nav-buttons {
          width: 100%;
          flex-wrap: wrap;
        }

        .nav-btn {
          flex: 1;
          text-align: center;
          min-width: calc(50% - 6px);
        }

        .app-frame {
          margin-top: 170px;
          min-height: calc(100vh - 170px);
        }
      }
    </style>
  </head>

  <body>
    <nav class="main-nav">
      <div class="nav-container">
        <div class="nav-logo">🚀 Générateur IA</div>
        <div class="nav-buttons">
          <a href="#" class="nav-btn" id="btn-prompt" data-app="prompt">
            ✏️ Prompts
          </a>
          <a href="#" class="nav-btn" id="btn-workflow" data-app="workflow">
            🔄 Workflows
          </a>
          <a href="#" class="nav-btn" id="btn-mindmap" data-app="mindmap">
            🧠 Mind Maps
          </a>
          <a href="#" class="nav-btn" id="btn-infographie" data-app="infographie">
            📊 Infographies
          </a>
        </div>
      </div>
    </nav>

    <iframe id="app-frame" class="app-frame" src="apps/prompt/prompt.html"></iframe>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const app = urlParams.get('app') || 'prompt';
      
      const buttons = document.querySelectorAll('.nav-btn');
      const frame = document.getElementById('app-frame');

      const appPaths = {
        'prompt': 'apps/prompt/prompt.html',
        'workflow': 'apps/workflow/workflow-generator.html',
        'mindmap': 'apps/mindmap/mindmap-generator.html',
        'infographie': 'apps/infographie/infographie.html'
      };

      function setActive(appName) {
        buttons.forEach(btn => {
          btn.classList.toggle('active', btn.dataset.app === appName);
        });
        
        if (appPaths[appName]) {
          frame.src = appPaths[appName];
        }
      }

      setActive(app);

      buttons.forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const appName = btn.dataset.app;
          window.history.pushState({}, '', '?app=' + appName);
          setActive(appName);
        });
      });

      window.addEventListener('popstate', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const app = urlParams.get('app') || 'prompt';
        setActive(app);
      });
    </script>
  </body>
</html>
