<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mind Map - Bibliothèques NLP Python</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%);
        overflow: hidden;
        width: 100vw;
        height: 100vh;
      }

      .container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        padding: 20px;
      }

      .header {
        text-align: center;
        margin-bottom: 15px;
        color: white;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
      }

      .header h1 {
        font-size: 2.2em;
        font-weight: 700;
        margin-bottom: 5px;
        letter-spacing: -0.5px;
      }

      .header p {
        font-size: 0.95em;
        opacity: 0.95;
        font-weight: 400;
      }

      .mindmap-wrapper {
        flex: 1;
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        position: relative;
        overflow: hidden;
      }

      .mindmap-container {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
      }

      .mindmap {
        position: absolute;
        transform-origin: 0 0;
        transition: transform 0.3s ease;
      }

      svg {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
      }

      .node {
        position: absolute;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        text-align: center;
        padding: 10px;
      }

      .node:hover {
        transform: scale(1.12) translateY(-2px);
        box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
      }

      .node.selected {
        transform: scale(1.12);
        box-shadow: 0 0 0 5px rgba(255, 215, 0, 0.6),
          0 12px 35px rgba(0, 0, 0, 0.25);
      }

      .node.large {
        width: 170px;
        height: 170px;
        font-size: 1.3em;
      }

      .node.medium {
        width: 140px;
        height: 140px;
        font-size: 1.05em;
      }

      .node.small {
        width: 115px;
        height: 115px;
        font-size: 0.9em;
      }

      .bg-blue {
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      }
      .bg-blue-light {
        background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
      }
      .bg-purple {
        background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
      }
      .bg-purple-light {
        background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
      }
      .bg-green {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      }
      .bg-green-light {
        background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
      }
      .bg-orange {
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      }
      .bg-orange-light {
        background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      }
      .bg-red {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      }
      .bg-red-light {
        background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
      }
      .bg-pink {
        background: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
      }
      .bg-pink-light {
        background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%);
      }
      .bg-cyan {
        background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
      }
      .bg-cyan-light {
        background: linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%);
      }
      .bg-indigo {
        background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      }
      .bg-indigo-light {
        background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
      }

      .controls {
        position: absolute;
        bottom: 30px;
        right: 30px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .control-row {
        display: flex;
        gap: 6px;
        justify-content: center;
      }

      .control-btn {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 1.1em;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
      }

      .control-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
      }

      .control-btn:active {
        transform: translateY(0);
      }

      .description-box {
        position: absolute;
        bottom: 30px;
        left: 30px;
        right: 180px;
        background: white;
        padding: 28px 32px;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        border-left: 5px solid #3b82f6;
        z-index: 2;
        display: none;
        max-height: 350px;
        overflow-y: auto;
      }

      .description-box.active {
        display: block;
        animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      @keyframes slideUp {
        from {
          transform: translateY(30px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .description-box h3 {
        color: #1e293b;
        font-size: 1.6em;
        margin-bottom: 8px;
        font-weight: 700;
      }

      .description-box .subtitle {
        color: #64748b;
        font-size: 0.95em;
        margin-bottom: 16px;
        font-style: italic;
      }

      .description-box .content {
        color: #475569;
        font-size: 1.02em;
        line-height: 1.7;
      }

      .description-box ul {
        margin: 12px 0;
        padding-left: 20px;
      }

      .description-box li {
        margin: 8px 0;
        color: #475569;
      }

      .close-btn {
        position: absolute;
        top: 20px;
        right: 24px;
        background: none;
        border: none;
        font-size: 1.8em;
        color: #94a3b8;
        cursor: pointer;
        transition: all 0.2s;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
      }

      .close-btn:hover {
        color: #1e293b;
        background: #f1f5f9;
      }

      .description-box::-webkit-scrollbar {
        width: 8px;
      }

      .description-box::-webkit-scrollbar-track {
        background: #f1f5f9;
        border-radius: 10px;
      }

      .description-box::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }

      .description-box::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Mind Map - Bibliothèques NLP Python</h1>
        <p>Cliquez sur un nœud pour voir sa description détaillée</p>
      </div>

      <div class="mindmap-wrapper">
        <div class="mindmap-container">
          <div class="mindmap" id="mindmap">
            <svg id="svg"></svg>
            <div id="nodes"></div>
          </div>
        </div>

        <div class="controls">
          <div class="control-row">
            <button
              class="control-btn"
              onclick="moveMap('up')"
              title="Déplacer vers le haut"
            >
              ↑
            </button>
          </div>
          <div class="control-row">
            <button
              class="control-btn"
              onclick="moveMap('left')"
              title="Déplacer vers la gauche"
            >
              ←
            </button>
            <button class="control-btn" onclick="zoomMap('in')" title="Zoomer">
              +
            </button>
            <button
              class="control-btn"
              onclick="zoomMap('out')"
              title="Dézoomer"
            >
              −
            </button>
            <button
              class="control-btn"
              onclick="moveMap('right')"
              title="Déplacer vers la droite"
            >
              →
            </button>
          </div>
          <div class="control-row">
            <button
              class="control-btn"
              onclick="moveMap('down')"
              title="Déplacer vers le bas"
            >
              ↓
            </button>
          </div>
          <div class="control-row">
            <button
              class="control-btn"
              onclick="resetView()"
              title="Réinitialiser la vue"
              style="font-size: 1.1em"
            >
              ⟲
            </button>
          </div>
        </div>

        <div class="description-box" id="descriptionBox">
          <button class="close-btn" onclick="closeDescription()">×</button>
          <h3 id="descTitle"></h3>
          <div class="subtitle" id="descSubtitle"></div>
          <div class="content" id="descText"></div>
        </div>
      </div>
    </div>

      let currentZoom = 1;
      let currentX = 0;
      let currentY = 0;
      let selectedNode = null;

      function updateTransform() {
        const mindmap = document.getElementById("mindmap");
        mindmap.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentZoom})`;
      }

      function zoomMap(direction) {
        if (direction === "in") {
          currentZoom = Math.min(currentZoom + 0.1, 2);
        } else {
          currentZoom = Math.max(currentZoom - 0.1, 0.3);
        }
        updateTransform();
      }

      function moveMap(direction) {
        const step = 50;
        switch (direction) {
          case "up":
            currentY += step;
            break;
          case "down":
            currentY -= step;
            break;
          case "left":
            currentX += step;
            break;
          case "right":
            currentX -= step;
            break;
        }
        updateTransform();
      }

      function resetView() {
        currentZoom = 1;
        currentX = 0;
        currentY = 0;
        updateTransform();
      }

      function drawConnections() {
        const svg = document.getElementById("svg");

        let maxX = 0,
          maxY = 0;
        nodes.forEach((node) => {
          maxX = Math.max(maxX, node.x + 200);
          maxY = Math.max(maxY, node.y + 200);
        });

        svg.setAttribute("width", maxX);
        svg.setAttribute("height", maxY);

        connections.forEach((conn) => {
          const fromNode = nodes.find((n) => n.id === conn.from);
          const toNode = nodes.find((n) => n.id === conn.to);
          const line = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "line"
          );
          line.setAttribute("x1", fromNode.x);
          line.setAttribute("y1", fromNode.y);
          line.setAttribute("x2", toNode.x);
          line.setAttribute("y2", toNode.y);
          line.setAttribute("stroke", "#cbd5e1");
          line.setAttribute("stroke-width", "2");
          line.setAttribute("opacity", "0.6");
          svg.appendChild(line);
        });
      }

      function createNodes() {
        const container = document.getElementById("nodes");
        nodes.forEach((node) => {
          const div = document.createElement("div");
          div.className = `node ${node.size} ${node.color}`;
          div.textContent = node.label;
          div.setAttribute("data-id", node.id);

          const sizes = { large: 85, medium: 70, small: 57.5 };
          const size = sizes[node.size];

          div.style.left = node.x - size + "px";
          div.style.top = node.y - size + "px";

          div.onclick = () => showDescription(node.id);
          container.appendChild(div);
        });
      }

      function showDescription(nodeId) {
        document
          .querySelectorAll(".node")
          .forEach((n) => n.classList.remove("selected"));

        selectedNode = nodeId;
        const nodeElement = document.querySelector(`[data-id="${nodeId}"]`);
        if (nodeElement) {
          nodeElement.classList.add("selected");
        }

        const desc = descriptions[nodeId];
        document.getElementById("descTitle").textContent = nodes.find(
          (n) => n.id === nodeId
        ).label;
        document.getElementById("descSubtitle").textContent = desc.subtitle;
        document.getElementById("descText").innerHTML = desc.content;
        document.getElementById("descriptionBox").classList.add("active");
      }

      function closeDescription() {
        document.getElementById("descriptionBox").classList.remove("active");
        if (selectedNode) {
          document
            .querySelector(`[data-id="${selectedNode}"]`)
            ?.classList.remove("selected");
          selectedNode = null;
        }
      }

      drawConnections();
      createNodes();
    </script>
