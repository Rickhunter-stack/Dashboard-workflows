<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindly - Mind Mapping</title>
    <link rel="stylesheet" href="mindly-style-v2.css">
</head>
<body>
    <!-- Écran d'accueil -->
    <div id="home-screen" class="screen active">
        <div class="home-header">
            <h1 class="home-title">Mindly 2</h1>
            <button class="menu-btn" onclick="showMenu()">⋮</button>
        </div>

        <div class="add-button-container">
            <button class="add-btn" onclick="showCreateModal()">+</button>
        </div>

        <div id="mindmaps-list" class="mindmaps-list">
            <!-- Les mind maps seront insérées ici dynamiquement -->
        </div>
    </div>

    <!-- Écran de la mind map -->
    <div id="mindmap-screen" class="screen">
        <div class="mindmap-header">
            <button class="nav-btn" onclick="goHome()" title="Retour à l'accueil">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M3 12L5 10M5 10L12 3L19 10M5 10V20C5 20.5523 5.44772 21 6 21H9M19 10L21 12M19 10V20C19 20.5523 18.5523 21 18 21H15M9 21C9.55228 21 10 20.5523 10 20V16C10 15.4477 10.4477 15 11 15H13C13.5523 15 14 15.4477 14 16V20C14 20.5523 14.4477 21 15 21M9 21H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <button class="nav-btn" onclick="showLayersPanel()" title="Actions (Supprimer, Éditer...)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="1" fill="currentColor"/>
                    <circle cx="12" cy="5" r="1" fill="currentColor"/>
                    <circle cx="12" cy="19" r="1" fill="currentColor"/>
                </svg>
            </button>
        </div>

        <div id="mindmap-canvas" class="mindmap-canvas">
            <svg id="connections-svg" class="connections-svg"></svg>
            <div id="nodes-container" class="nodes-container"></div>
        </div>

        <!-- Info bulle raccourcis -->
        <div class="shortcuts-info" id="shortcuts-info">
            <strong>Raccourcis :</strong><br>
            • Double-clic : Naviguer ou Éditer<br>
            • Entrée : Éditer le nœud<br>
            • Suppr : Supprimer le nœud<br>
            • Échap : Désélectionner
        </div>
    </div>

    <!-- Modal de création -->
    <div id="create-modal" class="modal">
        <div class="modal-content">
            <h2>Nouvelle Mind Map</h2>
            <input type="text" id="mindmap-name-input" placeholder="Nom de la mind map..." class="modal-input">
            <div class="color-grid">
                <div class="color-option" data-color="orange" style="background: linear-gradient(135deg, #ff9166 0%, #ff7744 100%);" onclick="selectColor('orange')"></div>
                <div class="color-option" data-color="blue" style="background: linear-gradient(135deg, #5eb5e0 0%, #4a9dc7 100%);" onclick="selectColor('blue')"></div>
                <div class="color-option" data-color="purple" style="background: linear-gradient(135deg, #6b7ba5 0%, #4a5578 100%);" onclick="selectColor('purple')"></div>
                <div class="color-option" data-color="burgundy" style="background: linear-gradient(135deg, #8b2342 0%, #6b1832 100%);" onclick="selectColor('burgundy')"></div>
                <div class="color-option" data-color="teal" style="background: linear-gradient(135deg, #3dd5c8 0%, #2ab3a8 100%);" onclick="selectColor('teal')"></div>
                <div class="color-option" data-color="peach" style="background: linear-gradient(135deg, #ffc896 0%, #ffb876 100%);" onclick="selectColor('peach')"></div>
                <div class="color-option" data-color="mint" style="background: linear-gradient(135deg, #a8dfd5 0%, #88cfc5 100%);" onclick="selectColor('mint')"></div>
                <div class="color-option" data-color="gray" style="background: linear-gradient(135deg, #9ba5b0 0%, #7b8590 100%);" onclick="selectColor('gray')"></div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeCreateModal()">Annuler</button>
                <button class="btn-create" onclick="createMindmap()">Créer</button>
            </div>
        </div>
    </div>

    <!-- Modal d'édition de nœud -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h2>Éditer le nœud</h2>
            <input type="text" id="node-text-input" placeholder="Texte du nœud..." class="modal-input">
            <div class="color-grid">
                <div class="color-option" data-color="orange" style="background: linear-gradient(135deg, #ff9166 0%, #ff7744 100%);" onclick="selectNodeColor('orange')"></div>
                <div class="color-option" data-color="blue" style="background: linear-gradient(135deg, #5eb5e0 0%, #4a9dc7 100%);" onclick="selectNodeColor('blue')"></div>
                <div class="color-option" data-color="purple" style="background: linear-gradient(135deg, #6b7ba5 0%, #4a5578 100%);" onclick="selectNodeColor('purple')"></div>
                <div class="color-option" data-color="burgundy" style="background: linear-gradient(135deg, #8b2342 0%, #6b1832 100%);" onclick="selectNodeColor('burgundy')"></div>
                <div class="color-option" data-color="teal" style="background: linear-gradient(135deg, #3dd5c8 0%, #2ab3a8 100%);" onclick="selectNodeColor('teal')"></div>
                <div class="color-option" data-color="peach" style="background: linear-gradient(135deg, #ffc896 0%, #ffb876 100%);" onclick="selectNodeColor('peach')"></div>
                <div class="color-option" data-color="mint" style="background: linear-gradient(135deg, #a8dfd5 0%, #88cfc5 100%);" onclick="selectNodeColor('mint')"></div>
                <div class="color-option" data-color="pink" style="background: linear-gradient(135deg, #d5a8b8 0%, #c59ba8 100%);" onclick="selectNodeColor('pink')"></div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeEditModal()">Annuler</button>
                <button class="btn-create" onclick="saveNodeEdit()">Enregistrer</button>
            </div>
        </div>
    </div>

    <script src="mindly-app-v2.js"></script>
    
    <script>
        // Afficher les raccourcis au survol pendant 3 secondes
        document.addEventListener('DOMContentLoaded', () => {
            const shortcuts = document.getElementById('shortcuts-info');
            
            document.getElementById('mindmap-canvas').addEventListener('mouseenter', () => {
                shortcuts.classList.add('show');
                setTimeout(() => {
                    shortcuts.classList.remove('show');
                }, 3000);
            });
        });
    </script>
</body>
</html>
