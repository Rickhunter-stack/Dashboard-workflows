<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#e8eaf6;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>
  
  <!-- AI Brain Icon -->
  <g transform="translate(256, 256)">
    <!-- Left brain hemisphere -->
    <path d="M -80,-120 Q -140,-120 -140,-60 Q -140,-20 -120,0 Q -140,20 -140,60 Q -140,120 -80,120 L -20,120 L -20,-120 Z" 
          fill="url(#brainGrad)" stroke="none"/>
    
    <!-- Right brain hemisphere -->
    <path d="M 80,-120 Q 140,-120 140,-60 Q 140,-20 120,0 Q 140,20 140,60 Q 140,120 80,120 L 20,120 L 20,-120 Z" 
          fill="url(#brainGrad)" stroke="none"/>
    
    <!-- Circuit connections -->
    <g stroke="#667eea" stroke-width="8" fill="none" stroke-linecap="round">
      <!-- Left side circuits -->
      <circle cx="-90" cy="-70" r="12" fill="#4ade80"/>
      <line x1="-90" y1="-70" x2="-60" y2="-50"/>
      
      <circle cx="-110" cy="0" r="12" fill="#4ade80"/>
      <line x1="-110" y1="0" x2="-70" y2="0"/>
      
      <circle cx="-90" cy="70" r="12" fill="#4ade80"/>
      <line x1="-90" y1="70" x2="-60" y2="50"/>
      
      <!-- Right side circuits -->
      <circle cx="90" cy="-70" r="12" fill="#4ade80"/>
      <line x1="90" y1="-70" x2="60" y2="-50"/>
      
      <circle cx="110" cy="0" r="12" fill="#4ade80"/>
      <line x1="110" y1="0" x2="70" y2="0"/>
      
      <circle cx="90" cy="70" r="12" fill="#4ade80"/>
      <line x1="90" y1="70" x2="60" y2="50"/>
      
      <!-- Neural connections -->
      <path d="M -40,-40 Q -20,-20 0,-30 Q 20,-40 40,-30"/>
      <path d="M -40,0 Q -10,10 10,-5 Q 30,0 40,10"/>
      <path d="M -40,40 Q -10,30 10,35 Q 30,40 40,30"/>
    </g>
    
    <!-- Central spark/prompt icon -->
    <g transform="translate(0, -10)">
      <path d="M -5,-30 L 5,-10 L -10,-10 L 5,30 L -5,10 L 10,10 Z" 
            fill="#fbbf24" stroke="none"/>
    </g>
  </g>
  
  <!-- Subtle glow effect -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
</svg>
