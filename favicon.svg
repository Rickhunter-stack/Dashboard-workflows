<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Base sombre -->
    <radialGradient id="orb-base" cx="38%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a1a28" />
      <stop offset="55%" stop-color="#0d0d12" />
      <stop offset="100%" stop-color="#09090f" />
    </radialGradient>

    <!-- Highlight blanc (haut-gauche) -->
    <radialGradient id="orb-white" cx="30%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92" />
      <stop offset="48%" stop-color="#ffffff" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>

    <!-- Halo bleu (bas-droit) -->
    <radialGradient id="orb-blue" cx="72%" cy="72%" r="58%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.98" />
      <stop offset="55%" stop-color="#3b82f6" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>

    <!-- Halo violet (bas) -->
    <radialGradient id="orb-violet" cx="40%" cy="78%" r="58%">
      <stop offset="0%" stop-color="#7c6af7" stop-opacity="0.86" />
      <stop offset="55%" stop-color="#7c6af7" stop-opacity="0.20" />
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0" />
    </radialGradient>

    <clipPath id="orb-clip">
      <circle cx="16" cy="16" r="14.2" />
    </clipPath>
  </defs>

  <!-- Halo externe subtil -->
  <circle cx="16" cy="16" r="15.4" fill="none" stroke="#3b82f6" stroke-width="0.6" opacity="0.20" />
  <circle cx="16" cy="16" r="14.9" fill="none" stroke="#7c6af7" stroke-width="0.5" opacity="0.18" />

  <!-- Orbe -->
  <circle cx="16" cy="16" r="14.2" fill="url(#orb-base)" />

  <g clip-path="url(#orb-clip)">
    <circle cx="16" cy="16" r="14.2" fill="url(#orb-blue)" />
    <circle cx="16" cy="16" r="14.2" fill="url(#orb-violet)" opacity="0.95" />
    <circle cx="16" cy="16" r="14.2" fill="url(#orb-white)" opacity="0.95" />
  </g>

  <!-- Glint -->
  <ellipse cx="11" cy="9.5" rx="2.1" ry="1.3" fill="#ffffff" opacity="0.55" />
  <ellipse cx="11" cy="9.5" rx="1.0" ry="0.6" fill="#ffffff" opacity="0.85" />
</svg>
