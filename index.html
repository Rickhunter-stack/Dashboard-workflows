<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard IA - Outils de Productivité & Création</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="apps/shared/theme.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "DM Sans", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: var(--bg-gradient);
        background-attachment: fixed;
        color: var(--text);
        min-height: 100vh;
        display: flex;
      }

      .layout {
        display: flex;
        width: 100%;
        min-height: 100vh;
      }

      .sidebar {
        width: 240px;
        min-height: 100vh;
        background: rgba(255, 255, 255, 0.04);
        border-right: 1px solid var(--border);
        backdrop-filter: blur(var(--blur-strong)) saturate(1.35);
        -webkit-backdrop-filter: blur(var(--blur-strong)) saturate(1.35);
        box-shadow: 4px 0 48px rgba(0, 0, 0, 0.35);
        padding: 0 0 16px;
        display: flex;
        flex-direction: column;
      }

      .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 20px 18px 18px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 6px;
      }

      .brand-orb {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: radial-gradient(
            circle at 30% 30%,
            rgba(255, 255, 255, 0.9),
            transparent 55%
          ),
          radial-gradient(
            circle at 70% 70%,
            rgba(0, 189, 133, 0.9),
            transparent 60%
          );
        box-shadow:
          0 0 18px rgba(0, 189, 133, 0.9),
          0 0 40px rgba(128, 131, 255, 0.35);
      }

      .brand-text {
        display: flex;
        flex-direction: column;
      }

      .brand-title {
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: -0.03em;
      }

      .brand-sub {
        font-size: 0.7rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        margin-top: 2px;
      }

      .sidebar-nav {
        flex: 1;
        padding: 4px 10px;
        overflow-y: auto;
      }

      .sidebar-footer {
        padding: 10px 12px 6px;
        border-top: 1px solid var(--border);
      }

      .admin-menu {
        position: relative;
      }

      .admin-trigger {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.045);
        border: 1px solid var(--border-0);
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      .admin-trigger:hover {
        background: rgba(17, 19, 23, 0.98);
        border-color: var(--border-1);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.6);
      }

      .admin-user {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .admin-avatar {
        width: 30px;
        height: 30px;
        border-radius: 999px;
        background: radial-gradient(
            circle at 30% 30%,
            rgba(255, 255, 255, 0.9),
            transparent 55%
          ),
          radial-gradient(
            circle at 70% 70%,
            rgba(56, 189, 248, 0.9),
            transparent 60%
          );
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        font-weight: 600;
        color: #020617;
      }

      .admin-text {
        display: flex;
        flex-direction: column;
      }

      .admin-name {
        font-size: 0.8rem;
        font-weight: 500;
      }

      .admin-role {
        font-size: 0.7rem;
        color: var(--muted);
      }

      .admin-status {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--accent-2);
        box-shadow: 0 0 0 4px rgba(0, 189, 133, 0.18);
      }

      .admin-chevron {
        width: 14px;
        height: 14px;
        color: var(--muted);
        transition: transform 0.15s ease;
      }

      .admin-menu.open .admin-chevron {
        transform: rotate(180deg);
      }

      .admin-dropdown {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 54px;
        background: rgba(17, 19, 23, 0.98);
        border-radius: 14px;
        border: 1px solid var(--border-0);
        box-shadow:
          0 18px 45px rgba(0, 0, 0, 0.85),
          0 0 0 1px rgba(17, 19, 23, 0.9);
        padding: 8px 10px;
        display: none;
        z-index: 40;
      }

      .admin-menu.open .admin-dropdown {
        display: block;
      }

      .admin-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 7px 8px;
        border-radius: 10px;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.88);
        cursor: pointer;
        transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
        background: rgba(15, 23, 42, 0.98);
        border: 1px solid rgba(15, 23, 42, 1);
        appearance: none;
        -webkit-appearance: none;
      }

      .admin-item:hover {
        background: rgba(15, 23, 42, 1);
        border-color: rgba(148, 163, 184, 0.4);
      }

      .admin-item.danger {
        color: #f97373;
      }

      .admin-item-icon {
        width: 16px;
        height: 16px;
        color: var(--muted);
        flex-shrink: 0;
      }

      .nav-section {
        font-size: 0.6rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(232, 234, 240, 0.28);
        padding: 12px 6px 4px;
        display: block;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 12px;
        border-radius: 10px;
        font-size: 0.8rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.82);
        cursor: pointer;
        border: 1px solid transparent;
        text-decoration: none;
        margin-bottom: 4px;
        transition:
          background 0.15s,
          color 0.15s,
          border-color 0.15s,
          box-shadow 0.15s;
      }

      .nav-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        color: var(--muted);
      }

      .nav-item:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
        border-color: rgba(255, 255, 255, 0.12);
      }

      .nav-item.active {
        background: rgba(128, 131, 255, 0.18);
        color: #ffffff;
        border-color: rgba(192, 193, 255, 0.38);
        box-shadow:
          inset 0 0 18px rgba(128, 131, 255, 0.12),
          0 0 0 1px rgba(226, 226, 232, 0.05);
      }

      .main-shell {
        flex: 1;
        padding: 24px 28px;
        max-width: calc(100vw - 240px);
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .main-toolbar {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .mobile-menu-btn {
        display: none;
      }

      .view-toggle-group {
        display: inline-flex;
        background: rgba(15, 23, 42, 0.9);
        border-radius: 999px;
        padding: 4px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.5);
      }

      .view-toggle-btn {
        font-family: "DM Sans", system-ui, sans-serif;
        font-size: 12px;
        font-weight: 500;
        padding: 6px 12px;
        border-radius: 999px;
        border: none;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .view-toggle-btn:active {
        transform: translateY(1px);
      }

      .view-toggle-btn.view-active {
        background: rgba(148, 163, 184, 0.25);
        color: var(--text);
        box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.6);
      }

      .view-toggle-btn:not(.view-active):hover {
        color: var(--text);
      }

      .single-frame {
        flex: 1;
      }

      .app-frame {
        width: 100%;
        border: none;
        min-height: 100%;
        border-radius: 18px;
        box-shadow: var(--shadow-md);
        background: transparent;
      }

      .multi-frame {
        flex: 1;
        display: none;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 16px;
        padding-bottom: 4px;
      }

      .multi-frame iframe {
        width: 125%;
        height: 125%;
        border: none;
        border-radius: 18px;
        box-shadow: var(--shadow-md);
        background: transparent;
        transform: scale(0.8);
        transform-origin: top left;
        overflow: hidden;
      }

      .quicklinks-overlay {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.62);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        display: none;
        align-items: flex-start;
        justify-content: flex-start;
        padding: 18px 0 18px 18px;
        z-index: 3000;
      }

      .quicklinks-overlay.open {
        display: flex;
      }

      .quicklinks-drawer {
        width: min(360px, calc(100vw - 42px));
        background: rgba(15, 23, 42, 0.96);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 18px;
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.65);
        overflow: hidden;
      }

      .quicklinks-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.22);
      }

      .quicklinks-title {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .quicklinks-close {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        background: rgba(2, 6, 23, 0.55);
        color: var(--muted-2);
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease,
          border-color 0.15s ease;
      }

      .quicklinks-close:hover {
        background: rgba(2, 6, 23, 0.75);
        color: var(--text);
        border-color: rgba(148, 163, 184, 0.45);
      }

      .quicklinks-body {
        padding: 12px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        max-height: calc(100vh - 120px);
        overflow: auto;
      }

      .quicklink-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        width: 100%;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(2, 6, 23, 0.35);
        color: rgba(255, 255, 255, 0.88);
        cursor: pointer;
        text-decoration: none;
        transition: background 0.15s ease, border-color 0.15s ease,
          transform 0.08s ease;
      }

      .quicklink-item:hover {
        background: rgba(2, 6, 23, 0.55);
        border-color: rgba(148, 163, 184, 0.35);
        transform: translateY(-1px);
      }

      .quicklink-meta {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }

      .quicklink-label {
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .quicklink-url {
        font-size: 11px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .quicklink-badge {
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        color: var(--muted-2);
        flex-shrink: 0;
      }

      .mobile-bottom-nav {
        display: none;
      }

      @media (max-width: 900px) {
        .sidebar {
          width: 72px;
        }

        .brand-text {
          display: none;
        }

        .main-shell {
          max-width: calc(100vw - 72px);
          padding: 18px 18px 24px;
        }

        .nav-item span.label {
          display: none;
        }
      }

      /* Mobile (smartphone): sidebar off-canvas */
      @media (max-width: 640px) {
        body {
          padding-bottom: 84px;
        }

        .sidebar {
          position: fixed;
          top: 0;
          left: 0;
          height: 100vh;
          width: min(280px, 86vw);
          transform: translateX(-105%);
          transition: transform 0.2s ease;
          z-index: 2000;
          box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
        }

        body.nav-open .sidebar {
          transform: translateX(0);
        }

        .mobile-overlay {
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.62);
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
          z-index: 1900;
          display: none;
        }

        body.nav-open .mobile-overlay {
          display: block;
        }

        .main-shell {
          max-width: 100vw;
          padding: 14px 14px 18px;
        }

        .main-toolbar {
          justify-content: space-between;
          gap: 10px;
        }

        .brand-text {
          display: flex;
        }

        .nav-item span.label {
          display: inline;
        }

        .sidebar {
          width: min(280px, 86vw);
        }

        .mobile-menu-btn {
          width: 42px;
          height: 42px;
          border-radius: 12px;
          border: 1px solid var(--border);
          background: rgba(255, 255, 255, 0.06);
          backdrop-filter: blur(var(--blur)) saturate(1.2);
          -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
          color: rgba(232, 234, 240, 0.9);
          cursor: pointer;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
        }

        .mobile-menu-btn:hover {
          transform: translateY(-1px);
          background: rgba(255, 255, 255, 0.1);
          border-color: var(--border-1);
        }

        /* Multi-view becomes a vertical stack on mobile */
        .multi-frame {
          grid-template-columns: 1fr;
          grid-template-rows: auto;
          gap: 12px;
        }

        .multi-frame iframe {
          width: 100%;
          height: 520px;
          transform: none;
          border-radius: 16px;
        }

        .app-frame {
          border-radius: 16px;
        }

        .mobile-bottom-nav {
          position: fixed;
          left: 10px;
          right: 10px;
          bottom: 10px;
          display: grid;
          grid-template-columns: repeat(5, 1fr);
          gap: 6px;
          padding: 8px;
          border-radius: 22px;
          background: rgba(255, 255, 255, 0.055);
          border: 1px solid var(--border);
          box-shadow:
            0 24px 64px rgba(0, 0, 0, 0.58),
            0 0 0 1px rgba(255, 255, 255, 0.04) inset;
          z-index: 2100;
          backdrop-filter: blur(var(--blur-strong)) saturate(1.35);
          -webkit-backdrop-filter: blur(var(--blur-strong)) saturate(1.35);
        }

        .mobile-tab {
          display: inline-flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 3px;
          min-height: 52px;
          border-radius: 12px;
          border: 1px solid transparent;
          background: transparent;
          color: rgba(203, 213, 225, 0.78);
          cursor: pointer;
          font-size: 9px;
          font-weight: 600;
          letter-spacing: 0.08em;
          text-transform: uppercase;
        }

        .mobile-tab .mobile-tab-icon {
          width: 15px;
          height: 15px;
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }

        .mobile-tab.active {
          background: rgba(128, 131, 255, 0.16);
          border-color: rgba(192, 193, 255, 0.38);
          color: rgba(226, 226, 232, 0.98);
          box-shadow:
            inset 0 0 18px rgba(128, 131, 255, 0.18),
            0 10px 26px rgba(128, 131, 255, 0.08);
        }
      }
    </style>
  </head>

  <body>
    <div class="layout">
      <div class="mobile-overlay" id="mobile-overlay" aria-hidden="true"></div>
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-orb"></div>
          <div class="brand-text">
            <div class="brand-title">Dashboard</div>
            <div class="brand-sub">Tasks Studio</div>
          </div>
        </div>

        <nav class="sidebar-nav">
          <span class="nav-section">Navigation</span>
          <a href="#" class="nav-item" id="btn-kanban" data-app="kanban">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="3" y="4" width="5" height="16" rx="1" />
              <rect x="10" y="8" width="5" height="12" rx="1" />
              <rect x="17" y="11" width="5" height="9" rx="1" />
            </svg>
            <span class="label">Projets</span>
          </a>
          <a href="#" class="nav-item" id="btn-workflow" data-app="workflow">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <polyline points="5 3 19 12 5 21 5 3" />
            </svg>
            <span class="label">Workflows</span>
          </a>
          <a href="#" class="nav-item" id="btn-notes" data-app="notes">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>
            <span class="label">Notes</span>
          </a>
          <a href="#" class="nav-item" id="btn-rappels" data-app="rappels">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M18 8a6 6 0 1 0-12 0c0 4-1.5 6-2 6h16c-.5 0-2-2-2-6Z" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="label">Rappels</span>
          </a>
          <a href="#" class="nav-item" id="btn-agenda" data-app="agenda">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="17" rx="2" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="3" y1="9" x2="21" y2="9" />
            </svg>
            <span class="label">Agenda</span>
          </a>
          <a href="#" class="nav-item" id="btn-calc" data-app="calc">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="4" y="3" width="16" height="18" rx="2" />
              <line x1="8" y1="8" x2="12" y2="8" />
              <line x1="8" y1="12" x2="10" y2="12" />
              <line x1="8" y1="16" x2="10" y2="16" />
              <circle cx="15" cy="12" r="1" />
              <circle cx="18" cy="12" r="1" />
              <circle cx="15" cy="16" r="1" />
              <circle cx="18" cy="16" r="1" />
            </svg>
            <span class="label">Calculette</span>
          </a>
          <a href="#" class="nav-item" id="btn-links" data-app="links">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l1.92-1.92a4 4 0 0 0-5.66-5.66l-1.03 1.03" />
              <path d="M14 11a5 5 0 0 0-7.54-.54L4.54 12.38a4 4 0 1 0 5.66 5.66l1.03-1.03" />
            </svg>
            <span class="label">Liens</span>
          </a>
          <a href="#" class="nav-item" id="btn-prompt" data-app="prompt">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M12 20h9" />
              <path d="M16.5 3.5 20.5 7.5 9 19l-4 1 1-4 10.5-12.5Z" />
            </svg>
            <span class="label">Prompts</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <div class="admin-menu" id="admin-menu">
            <button type="button" class="admin-trigger" id="admin-trigger">
              <div class="admin-user">
                <div class="admin-avatar">
                  <span>AD</span>
                </div>
                <div class="admin-text">
                  <span class="admin-name">Admin</span>
                  <span class="admin-role">Analyste Senior</span>
                </div>
              </div>
              <div class="admin-status"></div>
              <svg
                class="admin-chevron"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </button>

            <div class="admin-dropdown" id="admin-dropdown">
              <button type="button" class="admin-item danger" id="admin-logout">
                <svg
                  class="admin-item-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                  <polyline points="10 17 15 12 10 7" />
                  <line x1="15" y1="12" x2="3" y2="12" />
                </svg>
                <span>Déconnexion</span>
              </button>
              <button
                type="button"
                class="admin-item"
                id="admin-settings"
              >
                <svg
                  class="admin-item-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="12" cy="12" r="3" />
                  <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 8 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 3.6 15a1.65 1.65 0 0 0-1.51-1H2a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 3.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 8 3.6a1.65 1.65 0 0 0 1-1.51V2a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 16 3.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"
                  />
                </svg>
                <span>Paramètres</span>
              </button>
            </div>
          </div>
        </div>
      </aside>

      <main class="main-shell">
        <div class="main-toolbar">
          <button type="button" class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Ouvrir le menu">
            ☰
          </button>
          <div class="view-toggle-group">
            <button
              id="btn-single-view"
              class="view-toggle-btn view-active"
              type="button"
            >
              Vue unique
            </button>
            <button
              id="btn-multi-view"
              class="view-toggle-btn"
              type="button"
            >
              Multivues
            </button>
          </div>
        </div>
        <div class="single-frame" id="single-frame">
          <iframe
            id="app-frame"
            class="app-frame"
            src="apps/kanban-lite/kanban.html"
          ></iframe>
        </div>
        <div class="multi-frame" id="multi-frame">
          <iframe src="apps/workflow/workflow-generator.html?compact=1"></iframe>
          <iframe src="apps/notes/notes.html?compact=1"></iframe>
          <iframe src="apps/rappels/rappels.html?compact=1"></iframe>
          <iframe src="apps/kanban-lite/kanban.html?compact=1"></iframe>
        </div>
      </main>
    </div>

    <div class="mobile-bottom-nav" id="mobile-bottom-nav" aria-label="Navigation mobile">
      <button type="button" class="mobile-tab" data-app="kanban">
        <span class="mobile-tab-icon">📁</span>
        <span>Projets</span>
      </button>
      <button type="button" class="mobile-tab" data-app="notes">
        <span class="mobile-tab-icon">📝</span>
        <span>Notes</span>
      </button>
      <button type="button" class="mobile-tab" data-app="workflow">
        <span class="mobile-tab-icon">🧩</span>
        <span>Workflows</span>
      </button>
      <button type="button" class="mobile-tab" data-app="rappels">
        <span class="mobile-tab-icon">🔔</span>
        <span>Rappels</span>
      </button>
      <button type="button" class="mobile-tab" data-app="agenda">
        <span class="mobile-tab-icon">📅</span>
        <span>Agenda</span>
      </button>
    </div>

    <div class="quicklinks-overlay" id="quicklinks-overlay" aria-hidden="true">
      <div class="quicklinks-drawer" role="dialog" aria-label="Liens rapides">
        <div class="quicklinks-header">
          <div class="quicklinks-title">Liens rapides</div>
          <button type="button" class="quicklinks-close" id="quicklinks-close" aria-label="Fermer">
            ✕
          </button>
        </div>
        <div class="quicklinks-body" id="quicklinks-body"></div>
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const app = urlParams.get("app") || "kanban";

      const buttons = document.querySelectorAll(".nav-item");
      const frame = document.getElementById("app-frame");
      const btnLinks = document.getElementById("btn-links");
      const quicklinksOverlay = document.getElementById("quicklinks-overlay");
      const quicklinksClose = document.getElementById("quicklinks-close");
      const quicklinksBody = document.getElementById("quicklinks-body");

      const appPaths = {
        project: "apps/project/project.html",
        workflow: "apps/workflow/workflow-generator.html",
        notes: "apps/notes/notes.html",
        rappels: "apps/rappels/rappels.html",
        kanban: "apps/kanban-lite/kanban.html",
        agenda: "apps/agenda/agenda.html",
        calc: "apps/calculator/calculator.html",
        links: "apps/links/links.html",
        prompt: "apps/prompt/prompt.html",
      };

      const singleFrame = document.getElementById("single-frame");
      const multiFrame = document.getElementById("multi-frame");
      const btnSingleView = document.getElementById("btn-single-view");
      const btnMultiView = document.getElementById("btn-multi-view");
      const adminMenu = document.getElementById("admin-menu");
      const adminTrigger = document.getElementById("admin-trigger");
      const adminDropdown = document.getElementById("admin-dropdown");
      const adminLogout = document.getElementById("admin-logout");
      const adminSettings = document.getElementById("admin-settings");
      const mobileMenuBtn = document.getElementById("mobile-menu-btn");
      const mobileOverlay = document.getElementById("mobile-overlay");
      const mobileTabs = document.querySelectorAll(".mobile-tab");

      function closeMobileNav() {
        document.body.classList.remove("nav-open");
        if (mobileOverlay) mobileOverlay.setAttribute("aria-hidden", "true");
      }

      function toggleMobileNav() {
        const willOpen = !document.body.classList.contains("nav-open");
        document.body.classList.toggle("nav-open", willOpen);
        if (mobileOverlay) mobileOverlay.setAttribute("aria-hidden", String(!willOpen));
      }

      mobileMenuBtn?.addEventListener("click", () => toggleMobileNav());
      mobileOverlay?.addEventListener("click", () => closeMobileNav());
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeMobileNav();
      });

      function setActive(appName) {
        buttons.forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.app === appName);
        });
        mobileTabs.forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.app === appName);
        });

        if (appPaths[appName]) {
          frame.src = appPaths[appName];
        }
      }

      function showSingleView() {
        singleFrame.style.display = "block";
        multiFrame.style.display = "none";
        btnSingleView.classList.add("view-active");
        btnMultiView.classList.remove("view-active");
      }

      function showMultiView() {
        singleFrame.style.display = "none";
        multiFrame.style.display = "grid";
        btnSingleView.classList.remove("view-active");
        btnMultiView.classList.add("view-active");
      }

      // Initialisation de la vue
      setActive(app);
      showSingleView();

      const QUICK_LINKS = [
        { label: "Claude", url: "https://claude.ai", group: "IA" },
        { label: "Grok", url: "https://grok.com", group: "IA" },
        { label: "ChatGPT", url: "https://chat.openai.com", group: "IA" },
        { label: "Google Sheets", url: "https://sheets.google.com", group: "Productivité" },
        { label: "Vercel", url: "https://vercel.com", group: "Dev" },
        { label: "GitHub", url: "https://github.com", group: "Dev" },
        { label: "Supabase", url: "https://supabase.com", group: "Dev" },
        { label: "Bitwarden", url: "https://bitwarden.com", group: "Sécurité" },
      ];

      function renderQuickLinks() {
        if (!quicklinksBody) return;
        quicklinksBody.innerHTML = QUICK_LINKS.map(
          (l) => `
            <a class="quicklink-item" href="${l.url}" target="_blank" rel="noopener noreferrer">
              <div class="quicklink-meta">
                <div class="quicklink-label">${l.label}</div>
                <div class="quicklink-url">${l.url}</div>
              </div>
              <div class="quicklink-badge">${l.group}</div>
            </a>
          `
        ).join("");

        // Fermer le tiroir dès qu'on clique sur un lien (tout en ouvrant dans un nouvel onglet)
        quicklinksBody.querySelectorAll(".quicklink-item").forEach((item) => {
          item.addEventListener("click", () => {
            closeQuickLinks();
          });
        });
      }

      function openQuickLinks() {
        renderQuickLinks();
        quicklinksOverlay.classList.add("open");
        quicklinksOverlay.setAttribute("aria-hidden", "false");
        btnLinks?.classList.add("active");
      }

      function closeQuickLinks() {
        quicklinksOverlay.classList.remove("open");
        quicklinksOverlay.setAttribute("aria-hidden", "true");
        btnLinks?.classList.remove("active");
      }

      buttons.forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          const appName = btn.dataset.app;
          if (appName === "links") {
            if (quicklinksOverlay.classList.contains("open")) {
              closeQuickLinks();
            } else {
              openQuickLinks();
            }
            return;
          }
          closeQuickLinks();
          window.history.pushState({}, "", "?app=" + appName);
          setActive(appName);
          showSingleView();
          closeMobileNav();
        });
      });

      mobileTabs.forEach((btn) => {
        btn.addEventListener("click", () => {
          const appName = btn.dataset.app;
          if (!appName) return;
          closeQuickLinks();
          window.history.pushState({}, "", "?app=" + appName);
          setActive(appName);
          showSingleView();
          closeMobileNav();
        });
      });

      btnSingleView.addEventListener("click", () => {
        showSingleView();
      });

      btnMultiView.addEventListener("click", () => {
        showMultiView();
      });

      if (quicklinksClose && quicklinksOverlay) {
        quicklinksClose.addEventListener("click", closeQuickLinks);
        quicklinksOverlay.addEventListener("click", (e) => {
          if (e.target === quicklinksOverlay) closeQuickLinks();
        });
        window.addEventListener("keydown", (e) => {
          if (e.key === "Escape" && quicklinksOverlay.classList.contains("open")) {
            closeQuickLinks();
          }
        });
      }

      if (adminTrigger && adminMenu && adminDropdown) {
        adminTrigger.addEventListener("click", () => {
          const isOpen = adminMenu.classList.toggle("open");
          adminTrigger.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });

        document.addEventListener("click", (event) => {
          if (!adminMenu.contains(event.target)) {
            adminMenu.classList.remove("open");
            adminTrigger.setAttribute("aria-expanded", "false");
          }
        });
      }

      if (adminLogout) {
        adminLogout.addEventListener("click", () => {
          alert("Déconnexion (à implémenter quand le login sera en place).");
          adminMenu.classList.remove("open");
          adminTrigger.setAttribute("aria-expanded", "false");
        });
      }

      if (adminSettings) {
        adminSettings.addEventListener("click", () => {
          alert("Paramètres (à implémenter plus tard).");
          adminMenu.classList.remove("open");
          adminTrigger.setAttribute("aria-expanded", "false");
        });
      }

      window.addEventListener("popstate", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const app = urlParams.get("app") || "kanban";
        setActive(app);
        showSingleView();
      });
    </script>
  </body>
</html>
