<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard IA - Outils de Productivité & Création</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="apps/shared/theme.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "DM Sans", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: var(--bg-gradient);
        color: var(--text);
        min-height: 100vh;
        display: flex;
      }

      .layout {
        display: flex;
        width: 100%;
        min-height: 100vh;
      }

      .sidebar {
        width: 240px;
        min-height: 100vh;
        background: rgba(5, 6, 18, 0.92);
        border-right: 1px solid var(--border);
        backdrop-filter: blur(var(--blur-strong));
        padding: 0 0 16px;
        display: flex;
        flex-direction: column;
      }

      .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 20px 18px 18px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 6px;
      }

      .brand-orb {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: radial-gradient(
            circle at 30% 30%,
            rgba(255, 255, 255, 0.9),
            transparent 55%
          ),
          radial-gradient(
            circle at 70% 70%,
            rgba(56, 189, 248, 0.9),
            transparent 60%
          );
        box-shadow:
          0 0 18px rgba(56, 189, 248, 0.9),
          0 0 40px rgba(59, 130, 246, 0.5);
      }

      .brand-text {
        display: flex;
        flex-direction: column;
      }

      .brand-title {
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: -0.03em;
      }

      .brand-sub {
        font-size: 0.7rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        margin-top: 2px;
      }

      .sidebar-nav {
        flex: 1;
        padding: 4px 10px;
        overflow-y: auto;
      }

      .sidebar-footer {
        padding: 10px 12px 6px;
        border-top: 1px solid var(--border);
      }

      .admin-menu {
        position: relative;
      }

      .admin-trigger {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.96);
        border: 1px solid rgba(15, 23, 42, 0.9);
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      .admin-trigger:hover {
        background: rgba(15, 23, 42, 1);
        border-color: rgba(148, 163, 184, 0.4);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.8);
      }

      .admin-user {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .admin-avatar {
        width: 30px;
        height: 30px;
        border-radius: 999px;
        background: radial-gradient(
            circle at 30% 30%,
            rgba(255, 255, 255, 0.9),
            transparent 55%
          ),
          radial-gradient(
            circle at 70% 70%,
            rgba(56, 189, 248, 0.9),
            transparent 60%
          );
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        font-weight: 600;
        color: #020617;
      }

      .admin-text {
        display: flex;
        flex-direction: column;
      }

      .admin-name {
        font-size: 0.8rem;
        font-weight: 500;
      }

      .admin-role {
        font-size: 0.7rem;
        color: var(--muted);
      }

      .admin-status {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #22c55e;
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.18);
      }

      .admin-chevron {
        width: 14px;
        height: 14px;
        color: var(--muted);
        transition: transform 0.15s ease;
      }

      .admin-menu.open .admin-chevron {
        transform: rotate(180deg);
      }

      .admin-dropdown {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 54px;
        background: rgba(15, 23, 42, 0.98);
        border-radius: 14px;
        border: 1px solid rgba(15, 23, 42, 1);
        box-shadow:
          0 18px 45px rgba(0, 0, 0, 0.85),
          0 0 0 1px rgba(15, 23, 42, 0.9);
        padding: 8px 10px;
        display: none;
        z-index: 40;
      }

      .admin-menu.open .admin-dropdown {
        display: block;
      }

      .admin-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 7px 8px;
        border-radius: 10px;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.88);
        cursor: pointer;
        transition: background 0.12s ease, color 0.12s ease;
      }

      .admin-item:hover {
        background: rgba(15, 23, 42, 0.96);
      }

      .admin-item.danger {
        color: #f97373;
      }

      .admin-item-icon {
        width: 16px;
        height: 16px;
        color: var(--muted);
        flex-shrink: 0;
      }

      .nav-section {
        font-size: 0.6rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(232, 234, 240, 0.28);
        padding: 12px 6px 4px;
        display: block;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 12px;
        border-radius: 10px;
        font-size: 0.8rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.82);
        cursor: pointer;
        border: 1px solid transparent;
        text-decoration: none;
        margin-bottom: 4px;
        transition:
          background 0.15s,
          color 0.15s,
          border-color 0.15s,
          box-shadow 0.15s;
      }

      .nav-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        color: var(--muted);
      }

      .nav-item:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
        border-color: rgba(255, 255, 255, 0.12);
      }

      .nav-item.active {
        background: rgba(108, 143, 255, 0.18);
        color: #ffffff;
        border-color: rgba(140, 170, 255, 0.45);
        box-shadow:
          inset 0 0 16px rgba(108, 143, 255, 0.1),
          0 0 0 1px rgba(255, 255, 255, 0.05);
      }

      .main-shell {
        flex: 1;
        padding: 24px 28px;
        max-width: calc(100vw - 240px);
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .main-toolbar {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .view-toggle-group {
        display: inline-flex;
        background: rgba(15, 23, 42, 0.9);
        border-radius: 999px;
        padding: 4px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.5);
      }

      .view-toggle-btn {
        font-family: "DM Sans", system-ui, sans-serif;
        font-size: 12px;
        font-weight: 500;
        padding: 6px 12px;
        border-radius: 999px;
        border: none;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .view-toggle-btn.view-active {
        background: rgba(148, 163, 184, 0.25);
        color: var(--text);
        box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.6);
      }

      .view-toggle-btn:not(.view-active):hover {
        color: var(--text);
      }

      .single-frame {
        flex: 1;
      }

      .app-frame {
        width: 100%;
        border: none;
        min-height: 100%;
        border-radius: 18px;
        box-shadow: var(--shadow-md);
        background: transparent;
      }

      .multi-frame {
        flex: 1;
        display: none;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 16px;
      }

      .multi-frame iframe {
        width: 100%;
        height: 100%;
        border: none;
        border-radius: 18px;
        box-shadow: var(--shadow-md);
        background: transparent;
      }

      @media (max-width: 900px) {
        .sidebar {
          width: 72px;
        }

        .brand-text {
          display: none;
        }

        .main-shell {
          max-width: calc(100vw - 72px);
          padding: 18px 18px 24px;
        }

        .nav-item span.label {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-orb"></div>
          <div class="brand-text">
            <div class="brand-title">Dashboard</div>
            <div class="brand-sub">Tasks Studio</div>
          </div>
        </div>

        <nav class="sidebar-nav">
          <span class="nav-section">Navigation</span>
          <a href="#" class="nav-item" id="btn-project" data-app="project">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="3" y="4" width="7" height="6" rx="1" />
              <rect x="14" y="4" width="7" height="6" rx="1" />
              <rect x="3" y="14" width="7" height="6" rx="1" />
              <rect x="14" y="14" width="7" height="6" rx="1" />
            </svg>
            <span class="label">Gestion Projets</span>
          </a>
          <a href="#" class="nav-item" id="btn-kanban" data-app="kanban">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="3" y="4" width="5" height="16" rx="1" />
              <rect x="10" y="8" width="5" height="12" rx="1" />
              <rect x="17" y="11" width="5" height="9" rx="1" />
            </svg>
            <span class="label">Kanban</span>
          </a>
          <a href="#" class="nav-item" id="btn-workflow" data-app="workflow">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <polyline points="5 3 19 12 5 21 5 3" />
            </svg>
            <span class="label">Workflows</span>
          </a>
          <a href="#" class="nav-item" id="btn-notes" data-app="notes">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>
            <span class="label">Notes</span>
          </a>
          <a href="#" class="nav-item" id="btn-rappels" data-app="rappels">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M18 8a6 6 0 1 0-12 0c0 4-1.5 6-2 6h16c-.5 0-2-2-2-6Z" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="label">Rappels</span>
          </a>
          <a href="#" class="nav-item" id="btn-calc" data-app="calc">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="4" y="3" width="16" height="18" rx="2" />
              <line x1="8" y1="8" x2="12" y2="8" />
              <line x1="8" y1="12" x2="10" y2="12" />
              <line x1="8" y1="16" x2="10" y2="16" />
              <circle cx="15" cy="12" r="1" />
              <circle cx="18" cy="12" r="1" />
              <circle cx="15" cy="16" r="1" />
              <circle cx="18" cy="16" r="1" />
            </svg>
            <span class="label">Calculette</span>
          </a>
          <a href="#" class="nav-item" id="btn-prompt" data-app="prompt">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M12 20h9" />
              <path d="M16.5 3.5 20.5 7.5 9 19l-4 1 1-4 10.5-12.5Z" />
            </svg>
            <span class="label">Prompts</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <div class="admin-menu" id="admin-menu">
            <button type="button" class="admin-trigger" id="admin-trigger">
              <div class="admin-user">
                <div class="admin-avatar">
                  <span>AD</span>
                </div>
                <div class="admin-text">
                  <span class="admin-name">Admin</span>
                  <span class="admin-role">Analyste Senior</span>
                </div>
              </div>
              <div class="admin-status"></div>
              <svg
                class="admin-chevron"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </button>

            <div class="admin-dropdown" id="admin-dropdown">
              <button type="button" class="admin-item danger" id="admin-logout">
                <svg
                  class="admin-item-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                  <polyline points="10 17 15 12 10 7" />
                  <line x1="15" y1="12" x2="3" y2="12" />
                </svg>
                <span>Déconnexion</span>
              </button>
              <button
                type="button"
                class="admin-item"
                id="admin-settings"
              >
                <svg
                  class="admin-item-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="12" cy="12" r="3" />
                  <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 8 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 3.6 15a1.65 1.65 0 0 0-1.51-1H2a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 3.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 8 3.6a1.65 1.65 0 0 0 1-1.51V2a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 16 3.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"
                  />
                </svg>
                <span>Paramètres</span>
              </button>
            </div>
          </div>
        </div>
      </aside>

      <main class="main-shell">
        <div class="main-toolbar">
          <div class="view-toggle-group">
            <button
              id="btn-single-view"
              class="view-toggle-btn view-active"
              type="button"
            >
              Vue unique
            </button>
            <button
              id="btn-multi-view"
              class="view-toggle-btn"
              type="button"
            >
              Multivues
            </button>
          </div>
        </div>
        <div class="single-frame" id="single-frame">
          <iframe
            id="app-frame"
            class="app-frame"
            src="apps/project/project.html"
          ></iframe>
        </div>
        <div class="multi-frame" id="multi-frame">
          <iframe src="apps/workflow/workflow-generator.html"></iframe>
          <iframe src="apps/notes/notes.html"></iframe>
          <iframe src="apps/rappels/rappels.html"></iframe>
          <iframe src="apps/kanban-lite/kanban.html"></iframe>
        </div>
      </main>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const app = urlParams.get("app") || "project";

      const buttons = document.querySelectorAll(".nav-item");
      const frame = document.getElementById("app-frame");

      const appPaths = {
        project: "apps/project/project.html",
        workflow: "apps/workflow/workflow-generator.html",
        notes: "apps/notes/notes.html",
        rappels: "apps/rappels/rappels.html",
        kanban: "apps/kanban-lite/kanban.html",
        calc: "apps/calculator/calculator.html",
        prompt: "apps/prompt/prompt.html",
      };

      const singleFrame = document.getElementById("single-frame");
      const multiFrame = document.getElementById("multi-frame");
      const btnSingleView = document.getElementById("btn-single-view");
      const btnMultiView = document.getElementById("btn-multi-view");
      const adminMenu = document.getElementById("admin-menu");
      const adminTrigger = document.getElementById("admin-trigger");
      const adminDropdown = document.getElementById("admin-dropdown");
      const adminLogout = document.getElementById("admin-logout");
      const adminSettings = document.getElementById("admin-settings");

      function setActive(appName) {
        buttons.forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.app === appName);
        });

        if (appPaths[appName]) {
          frame.src = appPaths[appName];
        }
      }

      function showSingleView() {
        singleFrame.style.display = "block";
        multiFrame.style.display = "none";
        btnSingleView.classList.add("view-active");
        btnMultiView.classList.remove("view-active");
      }

      function showMultiView() {
        singleFrame.style.display = "none";
        multiFrame.style.display = "grid";
        btnSingleView.classList.remove("view-active");
        btnMultiView.classList.add("view-active");
      }

      // Initialisation de la vue
      setActive(app);
      showSingleView();

      buttons.forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          const appName = btn.dataset.app;
          window.history.pushState({}, "", "?app=" + appName);
          setActive(appName);
          showSingleView();
        });
      });

      btnSingleView.addEventListener("click", () => {
        showSingleView();
      });

      btnMultiView.addEventListener("click", () => {
        showMultiView();
      });

      if (adminTrigger && adminMenu && adminDropdown) {
        adminTrigger.addEventListener("click", () => {
          const isOpen = adminMenu.classList.toggle("open");
          adminTrigger.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });

        document.addEventListener("click", (event) => {
          if (!adminMenu.contains(event.target)) {
            adminMenu.classList.remove("open");
            adminTrigger.setAttribute("aria-expanded", "false");
          }
        });
      }

      if (adminLogout) {
        adminLogout.addEventListener("click", () => {
          alert("Déconnexion (à implémenter quand le login sera en place).");
          adminMenu.classList.remove("open");
          adminTrigger.setAttribute("aria-expanded", "false");
        });
      }

      if (adminSettings) {
        adminSettings.addEventListener("click", () => {
          alert("Paramètres (à implémenter plus tard).");
          adminMenu.classList.remove("open");
          adminTrigger.setAttribute("aria-expanded", "false");
        });
      }

      window.addEventListener("popstate", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const app = urlParams.get("app") || "project";
        setActive(app);
        showSingleView();
      });
    </script>
  </body>
</html>
